name: Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, dev]

jobs:
  dependency-audit:
    name: Análise de dependências
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install pip-audit
      - run: pip-audit -r requirements.lock

  build-and-scan:
    name: Build e Scan
    runs-on: ubuntu-latest
    needs: dependency-audit
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: docker build -t minha-api:${{ github.sha }} .
      - uses: actions/upload-artifact@v4
        with:
          name: image
          path: image.tar
      - name: Scan Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: minha-api:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library

  push-main:
    name: Push pro DockerHub
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/upload-artifact@v4
        with:
          name: image
          path: image.tar
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - run: |
          docker tag minha-api:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/minha-api:latest
          docker tag minha-api:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/minha-api:${{ github.sha }}

      - run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/minha-api:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/minha-api:${{ github.sha }}


  push-dev:
    name: Push pro DockerHub
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    steps:
      - uses: actions/upload-artifact@v4
        with:
          name: image
          path: image.tar
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - run: |
          docker tag minha-api:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/minha-api:dev
          docker tag minha-api:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/minha-api:${{ github.sha }}

      - run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/minha-api:dev
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/minha-api:${{ github.sha }}
