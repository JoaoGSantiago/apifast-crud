name: Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, dev]

jobs:
  dependency-audit:
    name: dependency-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install pip-audit
      - run: pip-audit -r requirements.lock

  build-and-scan:
    name: build-and-scan
    runs-on: ubuntu-latest
    needs: dependency-audit
    steps:
      - uses: actions/checkout@v4
      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::10}" >> $GITHUB_ENV
      
      - name: Build
        run: docker build -t minha-api:${{ env.SHORT_SHA }} .

      - name: Save image
        run: docker save minha-api:${{ env.SHORT_SHA }} -o image.tar

      - uses: actions/upload-artifact@v4
        with:
          name: image
          path: image.tar
      - name: Scan Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          version: v0.70.0
          image-ref: minha-api:${{ env.SHORT_SHA }}
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library

  push-main:
    name: Push pro DockerHub
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: image
      - run: docker load -i image.tar
      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::10}" >> $GITHUB_ENV
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - run: |
          docker tag minha-api:${{ env.SHORT_SHA }} ${{ secrets.DOCKERHUB_USERNAME }}/minha-api:latest
          docker tag minha-api:${{ env.SHORT_SHA }} ${{ secrets.DOCKERHUB_USERNAME }}/minha-api:${{ env.SHORT_SHA }}

      - run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/minha-api:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/minha-api:${{ env.SHORT_SHA }}


  push-dev:
    name: Push pro DockerHub
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: image
      - run: docker load -i image.tar
      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::10}" >> $GITHUB_ENV
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - run: |
          docker tag minha-api:${{ env.SHORT_SHA }} ${{ secrets.DOCKERHUB_USERNAME }}/minha-api:dev
          docker tag minha-api:${{ env.SHORT_SHA }} ${{ secrets.DOCKERHUB_USERNAME }}/minha-api:${{ env.SHORT_SHA }}

      - run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/minha-api:dev
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/minha-api:${{ env.SHORT_SHA }}
